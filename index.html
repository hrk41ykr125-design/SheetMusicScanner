<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽譜スキャナー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 min-h-screen font-sans text-gray-800 pb-10">
    <!-- ヘッダー -->
    <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-music mr-2"></i>楽譜スキャナー</h1>
        <button id="view-spreadsheet-btn"
            class="bg-indigo-500 hover:bg-indigo-400 text-white text-xs font-bold py-1.5 px-3 rounded flex items-center transition">
            <i class="fa-solid fa-table-list mr-1.5"></i>シートを表示
        </button>
    </header>

    <main class="max-w-lg mx-auto p-4 space-y-6">

        <!-- 設定セクション (APIキーなど。初回のみ入力) -->
        <section class="bg-white p-4 rounded-xl shadow border border-gray-200">
            <h2 class="text-sm font-semibold mb-3 border-b pb-2 text-gray-600"><i
                    class="fa-solid fa-gear mr-2"></i>システム設定 (初回のみ)</h2>
            <div class="space-y-3">
                <div class="mb-4">
                    <label for="gemini-api-key" class="block text-sm font-medium text-gray-700">Google Gemini API
                        キー</label>
                    <input type="password" id="gemini-api-key" placeholder="AIzaSy..."
                        class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <!-- 追加: AIモデル名 -->
                <div class="mb-4">
                    <label for="gemini-model" class="block text-sm font-medium text-gray-700">Gemini モデル名</label>
                    <div class="flex gap-2 mt-1">
                        <select id="gemini-model"
                            class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                            <option value="gemini-1.5-flash" selected>gemini-1.5-flash</option>
                            <option value="gemini-1.5-pro">gemini-1.5-pro</option>
                        </select>
                        <button id="fetch-models-btn" type="button"
                            class="shrink-0 bg-indigo-50 text-indigo-700 border border-indigo-200 font-semibold py-2 px-3 rounded-md hover:bg-indigo-100 transition text-xs">
                            一覧取得
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500">GAS Webアプリ URL</label>
                    <input type="url" id="gas-url" placeholder="https://script.google.com/macros/s/.../exec"
                        class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500">Google スプレッドシート URL</label>
                    <input type="url" id="spreadsheet-url" placeholder="https://docs.google.com/spreadsheets/d/..."
                        class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button id="save-settings-btn"
                        class="bg-gray-800 text-white font-semibold py-2 px-4 rounded-md hover:bg-gray-700 transition text-sm">
                        設定を保存
                    </button>
                    <button id="test-gas-btn"
                        class="bg-white text-indigo-600 border border-indigo-200 font-semibold py-2 px-2 rounded-md hover:bg-indigo-50 transition text-sm">
                        GAS接続テスト
                    </button>
                </div>
            </div>
        </section>

        <!-- カメラ・スキャンセクション -->
        <section class="bg-white p-4 rounded-xl shadow border border-gray-200">
            <div class="aspect-[3/4] bg-black rounded-lg overflow-hidden relative mb-4 shadow-inner">
                <video id="camera-preview" autoplay playsinline class="w-full h-full object-cover"></video>
                <!-- ローディング表示 -->
                <div id="loading-overlay"
                    class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center text-white hidden z-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 text-indigo-400"></i>
                    <p class="font-bold tracking-wider animate-pulse" id="loading-text">解析中...</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="start-camera-btn"
                    class="bg-indigo-50 text-indigo-700 border border-indigo-200 font-semibold py-3 px-2 rounded-lg hover:bg-indigo-100 transition flex flex-col items-center justify-center text-sm">
                    <i class="fa-solid fa-video text-lg mb-1"></i>ライブカメラ起動
                </button>
                <!-- スマホネイティブのカメラアプリも起動できる便利なフォールバック -->
                <label
                    class="bg-indigo-50 text-indigo-700 border border-indigo-200 font-semibold py-3 px-2 rounded-lg hover:bg-indigo-100 transition flex flex-col items-center justify-center text-sm cursor-pointer">
                    <i class="fa-solid fa-folder-open text-lg mb-1"></i>アルバム/撮影
                    <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden">
                </label>

                <button id="capture-btn" disabled
                    class="col-span-2 bg-indigo-600 text-white font-bold py-4 px-4 rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center shadow-lg mt-2">
                    <i class="fa-solid fa-camera-retro text-xl mr-2"></i>スキャンして情報取得
                </button>
            </div>
        </section>

        <!-- 結果表示セクション -->
        <section id="result-section" class="bg-white p-5 rounded-xl shadow border border-gray-200 hidden">
            <h2 class="text-lg font-bold border-b pb-2 mb-4 text-emerald-600 flex items-center">
                <i class="fa-solid fa-check-circle mr-2"></i>解析完了
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">楽譜タイトル</label>
                    <p id="result-title" class="font-extrabold text-gray-900 text-xl"></p>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">作曲者</label>
                    <p id="result-composer" class="text-gray-800 font-medium"></p>
                </div>
                <div class="bg-gray-50 p-3 rounded-md border border-gray-100">
                    <label class="block text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">楽曲情報</label>
                    <p id="result-desc" class="text-gray-700 text-sm leading-relaxed"></p>
                </div>
                <div class="pt-4 border-t mt-4">
                    <p class="text-sm border p-2 rounded-md bg-gray-50 text-center font-bold text-gray-500"
                        id="gas-status-text">
                        待機中...
                    </p>
                </div>
            </div>
        </section>
    </main>

    <!-- フローティングトースト通知 -->
    <div id="toast"
        class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-50 flex items-center min-w-[250px] justify-center">
        <i id="toast-icon" class="mr-2 fa-solid"></i>
        <span id="toast-message" class="text-sm font-medium whitespace-nowrap"></span>
    </div>

    <script src="script.js"></script>
</body>

</html>
