<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽譜スキャナー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 font-sans text-gray-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">

    <!-- ログイン画面 -->
    <div id="login-screen" class="fixed inset-0 bg-gray-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center border border-gray-100">
            <h1
                class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2">
                <i class="fa-solid fa-music mr-2"></i>楽譜スキャナー
            </h1>
            <p class="text-sm text-gray-500 mb-8">管理用パスワードを入力してください</p>

            <div class="space-y-4">
                <input type="password" id="login-password" placeholder="パスワード"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button id="login-btn"
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transform transition hover:-translate-y-0.5">
                    ログイン
                </button>
            </div>
        </div>
    </div>

    <!-- アプリ本体 (最初は非表示) -->
    <div id="app-content" class="hidden">
        <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40 flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-music mr-2"></i>楽譜スキャナー</h1>
            <button id="view-spreadsheet-btn"
                class="bg-indigo-500 hover:bg-indigo-400 text-white text-xs font-bold py-1.5 px-3 rounded flex items-center transition">
                <i class="fa-solid fa-table-list mr-1.5"></i>シートを表示
            </button>
        </header>

        <main class="max-w-lg mx-auto p-4 space-y-6">

            <!-- 設定セクション (アコーディオン) -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
                <button id="settings-toggle-btn"
                    class="w-full px-5 py-4 flex items-center justify-between text-left focus:outline-none hover:bg-gray-50 transition-colors">
                    <h2 class="text-sm font-semibold text-gray-700 border-b-0 m-0 pb-0">
                        <i class="fa-solid fa-gear mr-2 text-gray-500"></i>アプリシステム設定
                    </h2>
                    <i id="settings-chevron"
                        class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300"></i>
                </button>

                <div id="settings-content" class="px-5 pb-5 pt-1 hidden border-t border-gray-100">
                    <div class="space-y-4">
                        <div class="mb-4">
                            <label for="gemini-api-key" class="block text-xs font-medium text-gray-600 mb-1">Google
                                Gemini
                                API キー</label>
                            <input type="password" id="gemini-api-key" placeholder="AIzaSy..."
                                class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>

                        <div class="mb-4">
                            <label for="gemini-model" class="block text-xs font-medium text-gray-600 mb-1">Gemini
                                モデル名</label>
                            <div class="flex gap-2">
                                <select id="gemini-model"
                                    class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                                    <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                                    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                                    <option value="gemini-1.5-flash" selected>gemini-1.5-flash</option>
                                    <option value="gemini-1.5-pro">gemini-1.5-pro</option>
                                </select>
                                <button id="fetch-models-btn" type="button"
                                    class="shrink-0 bg-indigo-50 text-indigo-700 border border-indigo-200 font-semibold py-2 px-3 rounded-md hover:bg-indigo-100 transition-colors text-xs">
                                    一覧更新
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="block text-xs font-medium text-gray-600 mb-1">GAS Webアプリ URL</label>
                            <input type="url" id="gas-url" placeholder="https://script.google.com/macros/s/.../exec"
                                class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>

                        <div class="mb-4">
                            <label class="block text-xs font-medium text-gray-600 mb-1">Google スプレッドシート URL</label>
                            <input type="url" id="spreadsheet-url"
                                placeholder="https://docs.google.com/spreadsheets/d/..."
                                class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>

                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <button id="save-settings-btn"
                                class="bg-gray-800 text-white font-semibold py-2.5 px-4 rounded-md hover:bg-gray-700 transition-colors text-sm shadow-sm">
                                <i class="fa-solid fa-save mr-1"></i> 保存する
                            </button>
                            <button id="test-gas-btn"
                                class="bg-white text-indigo-600 border border-indigo-200 font-semibold py-2.5 px-3 rounded-md hover:bg-indigo-50 transition-colors text-sm shadow-sm">
                                <i class="fa-solid fa-vial mr-1"></i> GAS接続テスト
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- メインアプリ部分 -->
            <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden mb-6">
                <!-- カメラプレビュー -->
                <div class="relative bg-black h-48 sm:h-56">
                    <video id="camera-preview" autoplay playsinline class="w-full h-full object-cover"></video>
                    <!-- 読み取りガイド枠 -->
                    <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                        <div
                            class="w-11/12 h-1/2 border-2 border-indigo-400 rounded-lg shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]">
                        </div>
                    </div>
                    <div
                        class="absolute bottom-2 left-0 right-0 text-center text-xs text-white/80 pointer-events-none drop-shadow-md">
                        枠内に楽譜の左上（タイトル部分）を合わせてください
                    </div>

                    <!-- ローディングオーバーレイ (スキャン中) -->
                    <div id="loading-overlay"
                        class="absolute inset-0 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center hidden z-10 transition-opacity">
                        <div
                            class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent mb-3">
                        </div>
                        <p id="loading-text" class="text-white text-sm font-medium tracking-wide">AIで解析中...</p>
                    </div>
                </div>

                <div class="p-4">
                    <!-- 撮影ボタン -->
                    <button id="capture-btn" disabled
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-xl shadow-md transform transition hover:-translate-y-0.5 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-camera mr-2"></i>ここをスキャン
                    </button>
                </div>
            </div>

            <!-- 結果表示セクション -->
            <section id="result-section" class="bg-white p-5 rounded-xl shadow border border-gray-200 hidden">
                <h2 class="text-lg font-bold border-b pb-2 mb-4 text-emerald-600 flex items-center">
                    <i class="fa-solid fa-check-circle mr-2"></i>解析完了
                </h2>
                <div class="space-y-4">
                    <!-- タイトル -->
                    <div>
                        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">タイトル</h3>
                        <p id="result-title" class="text-xl font-bold text-gray-900 leading-tight"></p>
                    </div>
                    <!-- アーティスト名 -->
                    <div>
                        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">アーティスト名</h3>
                        <p id="result-artist" class="text-sm font-medium text-gray-800"></p>
                    </div>
                    <!-- 分類 -->
                    <div>
                        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">分類</h3>
                        <p id="result-category"
                            class="inline-block bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded-full font-semibold">
                        </p>
                    </div>
                    <!-- 作曲者 -->
                    <div>
                        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">作曲者</h3>
                        <p id="result-composer" class="text-sm text-gray-700"></p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-md border border-gray-100">
                        <label class="block text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">楽曲情報</label>
                        <p id="result-desc" class="text-gray-700 text-sm leading-relaxed"></p>
                    </div>
                    <div class="pt-4 border-t mt-4">
                        <p class="text-sm border p-2 rounded-md bg-gray-50 text-center font-bold text-gray-500"
                            id="gas-status-text">
                            待機中...
                        </p>
                    </div>
                </div>
            </section>
        </main>
    </div> <!-- app-content end -->

    <!-- フローティングトースト通知 -->
    <div id="toast"
        class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-50 flex items-center min-w-[250px] justify-center">
        <i id="toast-icon" class="mr-2 fa-solid"></i>
        <span id="toast-message" class="text-sm font-medium whitespace-nowrap"></span>
    </div>

    <script src="script.js"></script>
</body>

</html>
